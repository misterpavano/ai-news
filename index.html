<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI News Daily</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');
    :root{--bg:#080c0f;--surface:#0d1117;--surface2:#161b22;--border:#21262d;--green:#39ff14;--green-dim:#1a7a09;--blue:#58a6ff;--orange:#f97316;--text:#e6edf3;--muted:#8b949e;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;padding-bottom:80px;}
    .scanline{position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:0;}
    header{border-bottom:1px solid var(--border);padding:28px 40px;position:relative;z-index:1;}
    .term-bar{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:16px;display:flex;gap:16px;}
    .term-bar span{color:var(--green);}
    h1{font-family:'JetBrains Mono',monospace;font-size:clamp(24px,4vw,40px);font-weight:700;color:var(--green);letter-spacing:-0.02em;}
    h1 em{color:var(--text);font-style:normal;}
    .meta{margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);}
    .meta span{color:var(--blue);}
    .container{max-width:1200px;margin:0 auto;padding:40px 40px 0;position:relative;z-index:1;}
    .section-header{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green);margin-bottom:16px;display:flex;align-items:center;gap:12px;}
    .section-header::before{content:'##';}
    .section-header::after{content:'';flex:1;height:1px;background:var(--green-dim);}
    .feed{display:flex;flex-direction:column;gap:2px;margin-bottom:48px;}
    .item{background:var(--surface);border:1px solid var(--border);padding:18px 20px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:start;transition:border-color 0.15s,background 0.15s;text-decoration:none;color:inherit;}
    .item:hover{border-color:var(--green);background:var(--surface2);}
    .item-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green-dim);padding-top:2px;min-width:24px;}
    .item-body{}
    .item-tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--orange);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;}
    .item-title{font-size:15px;font-weight:600;line-height:1.4;margin-bottom:6px;}
    .item-summary{font-size:13px;color:var(--muted);line-height:1.6;}
    .item-source{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--blue);text-align:right;white-space:nowrap;padding-top:4px;}
    .blink{animation:blink 1s step-end infinite;} @keyframes blink{50%{opacity:0;}}
    footer{text-align:center;margin-top:60px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border-top:1px solid var(--border);padding-top:20px;position:relative;z-index:1;}
    @media(max-width:600px){header,.container{padding-left:20px;padding-right:20px;}.item{grid-template-columns:auto 1fr;}.item-source{display:none;}}
  </style>
</head>
<body>
  <div class="scanline"></div>
  <header>
    <div class="term-bar">wally@hq:~$ <span>./ai-news --date $(date +%Y-%m-%d) --format feed</span></div>
    <h1>AI/<em>news</em> <span class="blink">_</span></h1>
    <div class="meta">Compiled <span id="datestr">today</span> &nbsp;·&nbsp; Sources: multi-engine &nbsp;·&nbsp; Status: <span style="color:var(--green)">● LIVE</span></div>
  </header>
  <div class="container">
    <div class="section-header">Initializing</div>
    <div class="feed">
      <div class="item">
        <div class="item-num">01</div>
        <div class="item-body">
          <div class="item-tag">Status</div>
          <div class="item-title">First report generating...</div>
          <div class="item-summary">Wally is compiling today's AI news. Check back shortly.</div>
        </div>
        <div class="item-source">wally-hq</div>
      </div>
    </div>
  </div>
  <footer>AI News Daily &nbsp;·&nbsp; wally@hq &nbsp;·&nbsp; Refreshed daily</footer>
  <script>document.getElementById('datestr').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});</script>
</body>
</html>
